name: Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Stage APK to safe location
        run: |
          mkdir -p /tmp/apk-staging
          cp app/build/outputs/apk/debug/app-debug.apk /tmp/apk-staging/app-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: /tmp/apk-staging/app-debug.apk
          retention-days: 14

  publish:
    name: Publish APK to releases branch
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Switch to releases branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads origin releases; then
            git checkout releases
          else
            git checkout --orphan releases
            git rm -rf . || true
            git commit --allow-empty -m "Initialize releases branch"
            git push -u origin releases
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: /tmp/apk-staging

      - name: Commit and push APK to releases branch
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          SHORT_SHA=${GITHUB_SHA::7}

          mkdir -p apks
          cp /tmp/apk-staging/app-debug.apk "apks/app-debug-${TIMESTAMP}-${SHORT_SHA}.apk"
          cp /tmp/apk-staging/app-debug.apk apks/app-debug-latest.apk

          git add apks/
          git commit -m "Add debug APK from ${GITHUB_REF_NAME} @ ${SHORT_SHA} (${TIMESTAMP})"
          git push origin releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
